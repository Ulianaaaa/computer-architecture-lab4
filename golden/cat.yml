in_source: |
  a = read();
  print(a);
in_trap_schedule: '[[10, 77]]'
out_code: |-
  ADDRESS  - HEXCODE  - MNEMONIC
  --------------------------------
  00000000 - 0D100080 - Opcode.IN rd:1 rs1:0 imm:128
  00000004 - 06010064 - Opcode.SW rd:0 rs1:1 imm:100
  00000008 - 05100064 - Opcode.LW rd:1 rs1:0 imm:100
  0000000C - 0E010084 - Opcode.OUT rd:0 rs1:1 imm:132
  00000010 - FF000000 - Opcode.HALT rd:0 rs1:0 imm:0
